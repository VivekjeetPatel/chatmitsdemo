spring.application.name=chatmits-backend

# Database Configuration (Defaults to MySQL for local, overridden by Render Env Vars)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/chatmits_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:vivek7389}

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
# Hibernate will auto-detect the dialect based on the datasource URL
spring.jpa.properties.hibernate.dialect=
spring.jpa.open-in-view=false

# Server Port
server.port=${PORT:8080}
